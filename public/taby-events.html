<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Täby Events Calendar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <header class="site-header">
        <div class="header-container">

            <a href="index.html" class="logo">📅 Täby Events</a>
            <nav class="site-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="events.html">Sollentuna Events</a></li>
                    <li><a href="taby-events.html" class="active">Täby Events</a></li>
                    <li><a href="vasby-events.html">Upplands Väsby Events</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>

        </div>
    </header>


    
    <main class="main-content">
        <div class="events-header">

            <h1>📅 Täby Events Calendar <span class="taby-badge">Täby</span></h1>
            <p>Discover events in Täby - Culture, leisure activities, and more</p>

            <div class="filters">

                <div class="filter-group">
                    <label>Date Range:</label>
                    <input type="date" id="startDate">
                    <span>to</span>
                    <input type="date" id="endDate">
                </div>
                <button class="btn" id="applyFilters">Apply Filters</button>

            </div>
        </div>

        <div class="events-layout">

            <div class="events-sidebar" id="sidebar">
                <div class="loading">Loading Täby events...</div>
            </div>

            <div class="map-container">
                <div id="map"></div>
            </div>

        </div>
    </main>

    <footer class="site-footer">

        <div class="footer-content">
            <p>&copy; 2024 Täby Events. All rights reserved.</p>
        </div>
        
    </footer>



<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/taby.js"></script>
